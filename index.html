<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login to POS Coffee</title>
    <link rel="stylesheet" href="/src/output.css" />
  </head>

  <body class="bg-[#f8f8f8]">
    <form action="">
      <main class="flex justify-center items-center h-screen p-5">
        <!-- Hero Image -->
        <section
          class="w-[450px] h-[500px] overflow-hidden rounded-l-xl shadow-md hidden md:block"
        >
          <img
            src="/img/top-view-hot-espresso-with-brown-coffee-seeds-brown-wooden-desk-coffee-cup-drink.jpg"
            alt="Coffee"
            class="w-full h-full object-cover"
          />
        </section>

        <!-- Login Form -->
        <section
          class="w-[400px] h-[500px] bg-white rounded-r-xl shadow-md flex items-center"
        >
          <div class="w-full p-10">
            <!-- Title -->
            <div class="text-center mb-8">
              <h1 class="text-3xl font-bold text-[#2c2c2c]">POS Coffee</h1>
              <p class="text-gray-400 text-sm">Login to your account</p>
            </div>

            <!-- User ID -->
            <div class="mb-4">
              <label class="text-sm text-gray-600">User ID</label>
              <input
                type="text"
                placeholder="Enter your ID"
                class="w-full mt-1 p-3 border rounded-lg bg-gray-100 outline-none focus:ring-2 focus:ring-brown-400"
                required
              />
            </div>

            <!-- Role -->
            <div class="mb-6">
              <label class="text-sm text-gray-600">Select Role</label>
              <select
                name=""
                id=""
                class="w-full mt-1 p-3 border rounded-lg bg-gray-100 outline-none focus:ring-2 focus:ring-brown-400"
                required
              >
                <option value="staff">Staff</option>
                <option value="manager">Manager</option>
                <option value="admin">Admin</option>
              </select>
            </div>

            <!-- Password -->
            <div class="mb-6">
              <label class="text-sm text-gray-600">Password</label>
              <input
                type="password"
                placeholder="Enter Your Password"
                class="w-full mt-1 p-3 border rounded-lg bg-gray-100 outline-none focus:ring-2 focus:ring-brown-400"
                required
              />
            </div>

            <!-- Login Button -->
            <button
              class="w-full bg-[#6b4f4f] text-white py-3 rounded-lg hover:bg-[#5a3f3f] transition cursor-pointer"
            >
              Login
            </button>

            <!-- link page -->
            <div><a href="/pages/index.html">Link page</a></div>
          </div>
        </section>
      </main>
    </form>
  </body>
</html>
